<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hooked Seafood - iPhone Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .preview-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .preview-title {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
    }

    .preview-subtitle {
      color: #888;
      font-size: 16px;
      text-align: center;
    }

    /* iPhone 15 Pro Frame */
    .iphone {
      width: 393px;
      height: 852px;
      background: #000;
      border-radius: 55px;
      padding: 12px;
      box-shadow: 
        0 0 0 2px #333,
        0 0 0 4px #1a1a1a,
        0 25px 80px rgba(0,0,0,0.6),
        0 0 100px rgba(177, 15, 26, 0.15);
      position: relative;
    }

    .iphone-notch {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 37px;
      background: #000;
      border-radius: 0 0 20px 20px;
      z-index: 10;
    }

    .iphone-screen {
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 45px;
      overflow: hidden;
      position: relative;
    }

    .iphone-screen iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .iphone-buttons {
      position: absolute;
      right: -4px;
      top: 120px;
      width: 4px;
      height: 100px;
      background: #333;
      border-radius: 0 2px 2px 0;
    }

    .iphone-buttons::before {
      content: '';
      position: absolute;
      top: -60px;
      left: 0;
      width: 4px;
      height: 30px;
      background: #333;
      border-radius: 0 2px 2px 0;
    }

    .iphone-buttons::after {
      content: '';
      position: absolute;
      top: 130px;
      left: 0;
      width: 4px;
      height: 60px;
      background: #333;
      border-radius: 0 2px 2px 0;
    }

    /* Multiple iPhone Preview */
    .iphones-row {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .iphone-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .iphone-label {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Smaller iPhone for grid view */
    .iphone-small {
      width: 300px;
      height: 650px;
      border-radius: 45px;
    }

    .iphone-small .iphone-notch {
      width: 100px;
      height: 30px;
      border-radius: 0 0 15px 15px;
    }

    .iphone-small .iphone-screen {
      border-radius: 35px;
    }

    @media (max-width: 900px) {
      .iphones-row {
        flex-direction: column;
      }
      
      .iphone-small {
        width: 280px;
        height: 600px;
      }
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <div style="text-align: center; margin-bottom: 20px;">
      <h1 class="preview-title">🦀 Hooked Seafood</h1>
      <p class="preview-subtitle">Mobile Landing Page Preview — iPhone 15 Pro</p>
    </div>

    <div class="iphones-row">
      <!-- Hero View -->
      <div class="iphone-wrapper">
        <div class="iphone iphone-small">
          <div class="iphone-notch"></div>
          <div class="iphone-screen">
            <iframe src="index.html#hero" scrolling="no"></iframe>
          </div>
          <div class="iphone-buttons"></div>
        </div>
        <span class="iphone-label">Hero Section</span>
      </div>

      <!-- Specials View -->
      <div class="iphone-wrapper">
        <div class="iphone iphone-small">
          <div class="iphone-notch"></div>
          <div class="iphone-screen">
            <iframe src="index.html#daily_specials" scrolling="no"></iframe>
          </div>
          <div class="iphone-buttons"></div>
        </div>
        <span class="iphone-label">Daily Specials</span>
      </div>

      <!-- Location View -->
      <div class="iphone-wrapper">
        <div class="iphone iphone-small">
          <div class="iphone-notch"></div>
          <div class="iphone-screen">
            <iframe src="index.html#location" scrolling="no"></iframe>
          </div>
          <div class="iphone-buttons"></div>
        </div>
        <span class="iphone-label">Location</span>
      </div>

      <!-- Order View -->
      <div class="iphone-wrapper">
        <div class="iphone iphone-small">
          <div class="iphone-notch"></div>
          <div class="iphone-screen">
            <iframe src="index.html#how_to_order" scrolling="no"></iframe>
          </div>
          <div class="iphone-buttons"></div>
        </div>
        <span class="iphone-label">How to Order</span>
      </div>
    </div>

    <!-- Full Size Scrolling Preview -->
    <div style="margin-top: 40px; text-align: center;">
      <h2 style="color: #fff; margin-bottom: 20px; font-size: 20px;">📱 Full Page Scroll Preview</h2>
      <div class="iphone">
        <div class="iphone-notch"></div>
        <div class="iphone-screen">
          <iframe src="index.html"></iframe>
        </div>
        <div class="iphone-buttons"></div>
      </div>
    </div>
  </div>
</body>
</html>
